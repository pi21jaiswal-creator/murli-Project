<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Word Analysis</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='analysis/analysis.css') }}"
    >

    <script
        defer
        src="{{ url_for('static', filename='analysis/cards.js') }}"
    ></script>

    <script
        defer
        src="{{ url_for('static', filename='analysis/render.js') }}"
    ></script>

    <script
        defer
        src="{{ url_for('static', filename='analysis/wordManager.js') }}"
    ></script>

    <script
        defer
        src="{{ url_for('static', filename='analysis/events.js') }}"
    ></script>

    <script
        defer
        src="{{ url_for('static', filename='analysis/analysis.js') }}"
    ></script>

</head>

<body>
<header>
    <div class="container">
        <h1>📖 Word Analysis</h1>

        <div class="toolbar">
            <button onclick="loadFrequency()">
                Load Statistics
            </button>
            <input
                id="searchBox"
                type="text"
                placeholder="Search word..."
            >
        </div>
        <div id="bucketButtons"></div>  
    </div>

</header>

    <main>

        <!-- Left Side -->

        <section class="mainPanel">

            <div id="cardContainer">

                <!-- Count Cards will appear here -->

            </div>

        </section>

        <!-- Right Side -->

        <aside class="sidePanel">

            <div class="bucket">

                <h3>🗑 Excluded</h3>

                <div
                    id="excludedBucket"
                    class="drop-zone"
                ></div>

            </div>

            <div class="bucket">

                <h3>🧘 Yoga</h3>

                <div
                    id="yogaBucket"
                    class="drop-zone"
                ></div>

            </div>

            <div class="bucket">

                <h3>📚 Knowledge</h3>

                <div
                    id="knowledgeBucket"
                    class="drop-zone"
                ></div>

            </div>

            <div class="bucket">

                <h3>⭐ Favorites</h3>

                <div
                    id="favoriteBucket"
                    class="drop-zone"
                ></div>

            </div>

        </aside>

    </main>

</div>

</body>

</html>
