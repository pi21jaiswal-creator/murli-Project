<!DOCTYPE html>

<html>

<head>

```
<title>Murli Files</title>

<style>

    body {

        font-family: Arial, sans-serif;
        margin: 20px;

    }

    .container {

        display: flex;
        gap: 20px;

    }

    .left-panel {

        width: 30%;
        border-right: 1px solid #ccc;
        padding-right: 20px;

    }

    .right-panel {

        width: 70%;

    }

    .file-item {

        cursor: pointer;
        color: blue;

    }

    .file-item:hover {

        text-decoration: underline;

    }

    #content {

        white-space: pre-wrap;
        border: 1px solid #ccc;
        padding: 10px;
        min-height: 500px;
        overflow-y: auto;

    }

</style>
```

</head>

<body>

```
<h1>Murli Files</h1>

<button onclick="loadFiles()">
    Load Files
</button>

<p id="count"></p>

<div class="container">

    <div class="left-panel">

        <ul id="fileList"></ul>

    </div>

    <div class="right-panel">

        <h3 id="fileTitle">
            Select a file
        </h3>

        <div id="content">

            File content will appear here...

        </div>

    </div>

</div>

<script>

    async function loadFiles() {

        const response =
            await fetch('/files');

        const data =
            await response.json();

        document
            .getElementById('count')
            .innerText =
            `Files Found: ${data.file_count}`;

        const fileList =
            document.getElementById(
                'fileList'
            );

        fileList.innerHTML = '';

        data.files.forEach(file => {

            const li =
                document.createElement(
                    'li'
                );

            li.textContent = file;

            li.className =
                'file-item';

            li.onclick =
                () => loadFile(file);

            fileList.appendChild(li);

        });

    }

    async function loadFile(filename) {

        const response =
            await fetch(
                `/files/${filename}`
            );

        const text =
            await response.text();

        document
            .getElementById(
                'fileTitle'
            )
            .innerText =
            filename;

        document
            .getElementById(
                'content'
            )
            .textContent =
            text;

    }

</script>
```

</body>

</html>
